name: Publish Package

# Trigger: git tag v* && git push origin v*
#
# Required: repository secret NPM_TOKEN (granular token with "Bypass 2FA for automation" ON).
# Without bypass 2FA, publish fails with npm error EOTP (one-time password).
# Package setting must NOT be "disallow tokens" — use default publishing access instead.
# package.json repository.url must match GitHub org casing exactly (WoopSocial/n8n-nodes-woopsocial).
#
# Publishes with --provenance (required for n8n verified community nodes).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::Missing repository secret NPM_TOKEN."
            echo "::error::Create an npm granular publish token and add it under GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          RELEASE_MODE: 'true'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
