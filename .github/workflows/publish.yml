name: Publish Package

# Trigger: push a version tag, e.g. git tag v0.1.6 && git push origin v0.1.6
#
# Auth: npm Trusted Publisher (OIDC). Configure on npmjs.com → package → Settings →
# Trusted publishing → GitHub Actions → repo woopsocial/n8n-nodes-woopsocial, workflow publish.yml
#
# Important: do not use actions/setup-node "registry-url" in this workflow — it injects a
# fake NODE_AUTH_TOKEN that prevents OIDC from working.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Get OIDC token for npm
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('npm:registry.npmjs.org');
            core.setOutput('token', token);

      - name: Publish to npm
        run: npm publish --access public
        env:
          RELEASE_MODE: 'true'
          NPM_ID_TOKEN: ${{ steps.oidc.outputs.token }}
