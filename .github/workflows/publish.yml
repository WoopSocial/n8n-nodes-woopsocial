name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public
        env:
          RELEASE_MODE: 'true'
